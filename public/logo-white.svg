<svg width="1400" height="500" viewBox="0 0 1400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="500" fill="transparent"/>

  <!-- Roof Icon -->
  <path d="M460 170 L620 60 L780 170" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M760 170 L900 80 L1020 170" stroke="#C89B3C" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Window -->
  <rect x="650" y="120" width="18" height="18" rx="2" fill="white"/>
  <rect x="675" y="120" width="18" height="18" rx="2" fill="white"/>
  <rect x="650" y="145" width="18" height="18" rx="2" fill="white"/>
  <rect x="675" y="145" width="18" height="18" rx="2" fill="white"/>

